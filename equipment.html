<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment - Vora</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s ease;
    }

    .fade-up.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-white text-slate-900">

  <!-- NAVBAR -->
  <nav class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white z-50">
    <h1 class="text-xl font-bold text-orange-500">VORA</h1>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex gap-6 items-center">
      <li><a href="index.html" class="hover:text-orange-500">Home</a></li>
      <li><a href="equipment.html" class="hover:text-orange-500">Equipment</a></li>
      <li><a href="contact.html" class="hover:text-orange-500">Contact</a></li>
    </ul>

    <!-- Hamburger Button -->
    <button id="menuBtn" class="md:hidden text-3xl">
      ☰
    </button>
  </nav>

  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden flex flex-col px-6 py-4 space-y-4 border-b md:hidden bg-white">
    <a href="index.html">Home</a>
    <a href="equipment.html">Equipment</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- HEADER -->
  <section class="py-16 px-6 text-center bg-orange-50 fade-up">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
        Excavator Rental Offer
      </h1>
      <p class="text-slate-600 text-lg">
        Brand new heavy-duty excavators ready for mining and construction.
      </p>
    </div>
  </section>

  <!-- EQUIPMENT -->
  <section class="py-14 px-6 fade-up">
    <div class="max-w-5xl mx-auto">
      <div class="bg-white rounded-3xl border shadow-lg grid md:grid-cols-2">

        <div class="bg-orange-50 p-6 flex items-center justify-center">
          <img src="images/pic5.png" class="w-full max-h-80 object-contain">
        </div>

        <div class="p-8 flex flex-col justify-between">
          <div>
            <h2 class="text-3xl font-bold mb-2">Hitachi ZX350H-7G</h2>
            <p class="text-slate-500 mb-4">Brand New • 2025</p>

            <div class="space-y-3">
              <div class="flex justify-between border-b pb-2">
                <span>Weight</span>
                <span class="font-semibold">35 Ton</span>
              </div>
              <div class="flex justify-between border-b pb-2">
                <span>Bucket</span>
                <span class="font-semibold">1.80 m³</span>
              </div>
            </div>
          </div>

          <div class="mt-6">
            <select id="machineSelect" class="w-full p-3 border rounded mb-3">
              <option value="">Select Units</option>
              <option>1 Unit</option>
              <option>2 Units</option>
            </select>

            <button onclick="bookMachine()" class="w-full bg-orange-500 text-white py-3 rounded">
              Get Quote
            </button>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t py-6 text-center text-sm text-slate-500">
    © 2026 Vora
  </footer>

  <!-- SCRIPT -->
  <script>
    // Menu
    const menuBtn = document.getElementById('menuBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        mobileMenu.classList.add('hidden');
      }
    });

    // FIXED Fade Animation
    const faders = document.querySelectorAll('.fade-up');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    }, { threshold: 0.1 });

    faders.forEach(el => {
      observer.observe(el);

      // Force visible if already on screen
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight) {
        el.classList.add('show');
      }
    });

    // Backup safety (prevents white screen)
    window.addEventListener('load', () => {
      document.querySelectorAll('.fade-up').forEach(el => {
        el.classList.add('show');
      });
    });

    function bookMachine() {
      const selected = document.getElementById("machineSelect").value;

      if (!selected) {
        alert("Select units first");
        return;
      }

      window.location.href = "contact.html";
    }
  </script>

</body>
</html>
